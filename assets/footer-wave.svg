<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 110" width="900" height="110" role="img" aria-labelledby="title">
  <title id="title">Neon footer wave</title>
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0" />
      <stop offset="0.35" stop-color="#00d4ff" stop-opacity="0.72" />
      <stop offset="0.7" stop-color="#7c3aed" stop-opacity="0.76" />
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0" />
    </linearGradient>
    <filter id="blur" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="7" />
    </filter>
    <style>
      @keyframes glow { 0%, 100% { opacity: .36; } 50% { opacity: .82; } }
      .glow { animation: glow 3.6s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="900" height="110" fill="#0d1117" opacity="0" />
  <path class="glow" d="M0 70 C90 18 180 18 270 70 S450 122 540 70 720 18 900 70" fill="none" stroke="url(#wave)" stroke-width="5" filter="url(#blur)" />
  <path d="M0 70 C90 18 180 18 270 70 S450 122 540 70 720 18 900 70" fill="none" stroke="url(#wave)" stroke-width="2.2" />
  <path d="M0 92 C140 52 220 52 360 92 S590 132 900 82" fill="none" stroke="#30363d" stroke-width="1.2" opacity="0.58" />
</svg>
