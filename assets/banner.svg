<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" role="img" aria-labelledby="title desc">
  <title id="title">Heykode profile banner</title>
  <desc id="desc">Dark neon GitHub profile banner with animated grid, particles, and typewriter text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b12" />
      <stop offset="0.48" stop-color="#0d1117" />
      <stop offset="1" stop-color="#101827" />
    </linearGradient>
    <radialGradient id="haloA" cx="18%" cy="20%" r="65%">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0.32" />
      <stop offset="1" stop-color="#00d4ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="haloB" cx="86%" cy="70%" r="55%">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.34" />
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#1f6feb" stroke-width="0.7" opacity="0.16" />
    </pattern>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0" />
      <stop offset="0.5" stop-color="#00d4ff" stop-opacity="0.9" />
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0" />
    </linearGradient>
    <clipPath id="typeClip">
      <rect id="typeMask" x="246" y="145" width="0" height="28" />
    </clipPath>
    <style>
      @keyframes drift { from { transform: translateY(18px); opacity: 0; } 25% { opacity: .85; } 75% { opacity: .85; } to { transform: translateY(-34px); opacity: 0; } }
      @keyframes draw { to { width: 408px; } }
      @keyframes cursorMove { to { transform: translateX(408px); } }
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      @keyframes pulse { 0%, 100% { opacity: .38; } 50% { opacity: .82; } }
      .particle { animation: drift linear infinite; transform-box: fill-box; }
      #typeMask { animation: draw 2.7s steps(34) .25s forwards; }
      #cursor { animation: cursorMove 2.7s steps(34) .25s forwards, blink .8s infinite; }
      .pulse { animation: pulse 3.2s ease-in-out infinite; }
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </defs>

  <rect width="900" height="240" rx="24" fill="url(#bg)" />
  <rect width="900" height="240" rx="24" fill="url(#haloA)" />
  <rect width="900" height="240" rx="24" fill="url(#haloB)" />
  <rect x="1" y="1" width="898" height="238" rx="24" fill="url(#grid)" opacity="0.75" />
  <rect x="1" y="1" width="898" height="238" rx="24" fill="none" stroke="#1f6feb" stroke-opacity="0.28" />

  <g opacity="0.86">
    <circle class="particle" cx="94" cy="190" r="2.2" fill="#00d4ff" style="animation-duration:5.8s;animation-delay:.1s" />
    <circle class="particle" cx="174" cy="206" r="1.6" fill="#ffffff" style="animation-duration:7.2s;animation-delay:1.1s" />
    <circle class="particle" cx="264" cy="184" r="2" fill="#7c3aed" style="animation-duration:6.4s;animation-delay:.7s" />
    <circle class="particle" cx="354" cy="214" r="1.4" fill="#00d4ff" style="animation-duration:8s;animation-delay:2.2s" />
    <circle class="particle" cx="448" cy="194" r="1.8" fill="#ffffff" style="animation-duration:6.9s;animation-delay:1.6s" />
    <circle class="particle" cx="538" cy="212" r="2.1" fill="#00d4ff" style="animation-duration:5.9s;animation-delay:2.8s" />
    <circle class="particle" cx="642" cy="188" r="1.7" fill="#7c3aed" style="animation-duration:7.6s;animation-delay:.5s" />
    <circle class="particle" cx="736" cy="208" r="2" fill="#ffffff" style="animation-duration:6.1s;animation-delay:1.9s" />
    <circle class="particle" cx="814" cy="186" r="1.5" fill="#00d4ff" style="animation-duration:8.4s;animation-delay:1.2s" />
  </g>

  <g transform="translate(450 92)">
    <rect class="pulse" x="-250" y="31" width="500" height="2" rx="1" fill="url(#line)" />
    <text x="0" y="0" text-anchor="middle" font-size="48" font-weight="800" fill="#f0f6fc" letter-spacing="1.8">Heykode</text>
    <text x="0" y="36" text-anchor="middle" font-size="13" fill="#7dd3fc" letter-spacing="4">BUILD · AUTOMATE · ITERATE</text>
  </g>

  <g clip-path="url(#typeClip)">
    <text x="246" y="166" font-size="17" fill="#c9d1d9">AI automation builder crafting useful tools</text>
  </g>
  <text id="cursor" x="246" y="166" font-size="17" fill="#00d4ff" font-weight="800">|</text>
</svg>
